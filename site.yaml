# Landing-page manifest for the Poincaré Conjecture reference site.
#   bash scripts/build-site.sh        (syncs every project, then builds docs/)
# `root:` points at each project (dir containing hgraph/): it is both where the
# progress is computed and the route the card links to — the site is one app
# that hash-routes to #/<root> and reads docs/<root>/data.json, which
# `hgraph site` writes. There is no per-project dashboard.html any more (so no
# `href:` to keep in step; docs/<root>/dashboard.html is just a redirect stub).
# `category:` groups the cards under a heading, in order of first appearance,
# so the order below is the reading order: the geometry, then what it is all
# for, then the supporting subjects. The card names the *book* (author +
# book_title) because the section already names the subject.
#
# Add a project = add one entry here.
#
# image: is a cover, relative to this file; it is inlined into the page and
# downscaled to card size on the way in. `image_fit: contain` shows the whole
# cover — the card panel is landscape and a cover is portrait, so the default
# `cover` fit would crop it down to a band.
title: Poincaré Conjecture
favicon: site/img/frenzymath.png
subtitle: >
  A Lean 4 formalization of the proof of the Poincaré conjecture, built on a
  shared, machine-checked foundation of the geometry and analysis it relies on.
overview: site/overview.html

# Every project below lives in this one repo, so they share it: it is what the
# "send to GitHub" button on a node's review panel files its issue against.
# Without it that panel just says no repository is configured. A project in its
# own repo would override it with a `repo:` on its own entry.
repo: frenzymath/Poincare-Conjecture

# Optional: a line under each category heading. Keyed by the projects'
# `category:` below — drop an entry and that heading simply has no subtitle.
categories:
  Ricci Flow & the Poincaré Conjecture: >
    The conjecture itself — deforming a metric by its curvature, cutting out the
    singularities, and reading off the topology of what survives. Everything
    below supports it.
  Riemannian Geometry: >
    The core machinery — metrics, connections, curvature and geodesics, and the
    comparison theorems that turn curvature bounds into topology; with the
    smooth-manifold groundwork it is all stated on.
  Algebraic Topology: >
    The invariants the conjecture is phrased in: the fundamental group, covering
    spaces, and homology.
  Partial Differential Equations: >
    The analysis the flow rests on — Sobolev spaces and second-order elliptic
    theory.

projects:
  # The order here IS the reading order of the shelf: a category's heading appears
  # where its first project does. The conjecture leads; the rest is what it needs.
  - name: Ricci Flow & the Poincaré Conjecture
    root: MorganTian
    category: Ricci Flow & the Poincaré Conjecture
    author: John Morgan & Gang Tian
    book_title: Ricci Flow and the Poincaré Conjecture
    image: site/img/morgantian.jpg
    image_alt: Cover of Morgan & Tian, Ricci Flow and the Poincaré Conjecture (Clay Mathematics Monographs 3)
    image_fit: contain
    tag: Clay Monographs 3
    blurb: >
      Ricci flow with surgery, κ-solutions, and canonical neighborhoods —
      the analytic heart of the proof, after Morgan–Tian (arXiv:math/0607607).

  - name: Notes on Perelman's Papers
    root: KleinerLott
    category: Ricci Flow & the Poincaré Conjecture
    author: Bruce Kleiner & John Lott
    book_title: Notes on Perelman's Papers
    # Typographic title card, not a book jacket: this is a journal article
    # (Geom. Topol. 12 (2008) 2587–2855, arXiv:math/0605667), so there is no
    # cover art to reproduce. Replace with a publisher image if wanted.
    image: site/img/kleinerlott.svg
    image_alt: Title card for Kleiner & Lott, Notes on Perelman's Papers
    image_fit: contain
    tag: Geom. Topol. 12
    blurb: >
      The detailed line-by-line reading of Perelman's three preprints — entropy,
      no local collapsing, and the canonical-neighborhood theorem.

  - name: Hamilton–Perelman's Proof
    root: CaoZhu
    category: Ricci Flow & the Poincaré Conjecture
    author: Huai-Dong Cao & Xi-Ping Zhu
    book_title: Hamilton–Perelman's Proof of the Poincaré and Geometrization Conjectures
    # As above: Asian J. Math. 10 (2006) 165–492, revised arXiv version — an
    # article rather than a book, so the card is typographic by design.
    image: site/img/caozhu.svg
    image_alt: Title card for Cao & Zhu, Hamilton–Perelman's Proof of the Poincaré and Geometrization Conjectures
    image_fit: contain
    tag: Asian J. Math. 10
    blurb: >
      A second complete exposition of the Hamilton–Perelman programme, covering
      both the Poincaré and the geometrization conjectures.

  - name: Riemannian Geometry
    root: DoCarmo
    category: Riemannian Geometry
    author: Manfredo P. do Carmo
    book_title: Riemannian Geometry
    image: site/img/docarmo.jpg
    image_alt: Cover of do Carmo, Riemannian Geometry (Birkhäuser)
    image_fit: contain
    tag: DoCarmoLib
    blurb: >
      The shared foundation (DoCarmoLib) — metrics, connections, curvature,
      geodesics, and comparison theorems up to the Sphere Theorem.

  - name: Riemannian Geometry
    root: Petersen
    category: Riemannian Geometry
    author: Peter Petersen
    book_title: Riemannian Geometry
    image: site/img/petersen.jpg
    image_alt: Cover of Petersen, Riemannian Geometry (Springer GTM 171, 3rd ed.)
    image_fit: contain
    tag: PetersenLib · GTM 171
    blurb: >
      A complementary development on the shared foundation — examples, geodesics
      and distance, Killing fields, and convergence/finiteness theorems.

  - name: Riemannian Geometry
    root: LeeRiemannian
    category: Riemannian Geometry
    author: John M. Lee
    book_title: Introduction to Riemannian Manifolds
    image: site/img/leeriemannian.jpg
    image_alt: Cover of Lee, Introduction to Riemannian Manifolds (Springer GTM 176, 2nd ed.)
    image_fit: contain
    tag: LeeLib · GTM 176
    blurb: >
      A complementary geometry reference, written against the same foundation
      rather than restating it. Well advanced.

  # GTM 218 is not Riemannian geometry proper — it is the prerequisite volume the
  # rest is stated on. It sits in this section rather than its own because the
  # shelf reads as one geometry stack; the heading says so.
  - name: Smooth Manifolds
    root: LeeSmooth
    category: Riemannian Geometry
    author: John M. Lee
    book_title: Introduction to Smooth Manifolds
    image: site/img/leesmooth.jpg
    image_alt: Cover of Lee, Introduction to Smooth Manifolds (Springer GTM 218, 2nd ed.)
    image_fit: contain
    tag: LeeSmoothLib · GTM 218
    blurb: >
      The prerequisite volume to the GTM 176 project above: charts, tangent
      bundles, vector bundles, and vector fields. Chapters 1–8 only, imported
      and audited from an upstream extraction (see UPSTREAM_LEAN_AUDIT.md);
      substantially incomplete but builds clean.

  - name: Algebraic Topology
    root: Hatcher
    category: Algebraic Topology
    author: Allen Hatcher
    book_title: Algebraic Topology
    image: site/img/hatcher.jpg
    image_alt: Cover of Hatcher, Algebraic Topology (Cambridge University Press)
    image_fit: contain
    tag: HatcherLib
    blurb: >
      Fundamental group, covering spaces, homology and cohomology. The blueprint
      is complete; the Lean formalization has barely begun.

  - name: Partial Differential Equations
    root: Evans
    category: Partial Differential Equations
    author: Lawrence C. Evans
    book_title: Partial Differential Equations
    image: site/img/evans.jpg
    image_alt: Cover of Evans, Partial Differential Equations (AMS GSM 19)
    image_fit: contain
    tag: EvansLib · GSM 19
    blurb: >
      The analysis foundation — Sobolev spaces and second-order elliptic PDE.
      The blueprint is complete; Lean covers chapter 1 and the transport
      equation, with Laplace, heat and wave under way.
