# Landing-page manifest for the Poincaré Conjecture reference site.
#   hgraph site --manifest site.yaml --out docs/index.html --overview site/overview.html
# `root:` points at each project (dir containing hgraph/) to compute progress;
# `href:` is the link target inside the built site (docs/<Project>/dashboard.html).
# Add a project = add one entry here.
title: Formalizing the Poincaré Conjecture
subtitle: >
  A Lean 4 formalization of the proof of the Poincaré conjecture, built on a
  shared, machine-checked foundation of the geometry and analysis it relies on.
overview: site/overview.html

projects:
  - name: Riemannian Geometry
    root: DoCarmo
    href: DoCarmo/dashboard.html
    tag: do Carmo
    blurb: >
      The shared foundation (OpenGALib) — metrics, connections, curvature,
      geodesics, and comparison theorems up to the Sphere Theorem.

  - name: Riemannian Geometry
    root: Petersen
    href: Petersen/dashboard.html
    tag: Petersen
    blurb: >
      A complementary development on the shared foundation — examples, geodesics
      and distance, Killing fields, and convergence/finiteness theorems.

  - name: Ricci Flow & the Poincaré Conjecture
    root: MorganTian
    href: MorganTian/dashboard.html
    tag: Morgan–Tian
    blurb: >
      Ricci flow with surgery, κ-solutions, and canonical neighborhoods —
      the analytic heart of the proof, after Morgan–Tian (arXiv:math/0607607).

  - name: Riemannian Geometry
    root: Lee
    href: Lee/dashboard.html
    tag: Lee
    blurb: >
      Introduction to Riemannian Manifolds (Lee, GTM 176) — a complementary
      geometry reference. Blueprint complete; Lean formalization not yet begun.

  - name: Algebraic Topology
    root: Hatcher
    href: Hatcher/dashboard.html
    tag: Hatcher
    blurb: >
      Fundamental group, covering spaces, homology and cohomology (Hatcher).
      Blueprint only — formalization pending.

  - name: Partial Differential Equations
    root: Evans
    href: Evans/dashboard.html
    tag: Evans
    blurb: >
      Analysis foundations — Sobolev spaces and second-order elliptic PDE
      (Evans, GSM 19). Blueprint only — formalization pending.
