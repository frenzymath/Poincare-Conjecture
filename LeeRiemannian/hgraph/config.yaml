# LeeRiemannian — Riemannian geometry: blueprint + Lean library (LeeLib).
# Source: J. M. Lee, *Introduction to Riemannian Manifolds*, 2nd ed. (Springer GTM 176)
# Formerly the `Lee` project; renamed when LeeSmooth (the same author's
# *Introduction to Smooth Manifolds*, GTM 218) was added. The Lean library keeps
# its historical name, LeeLib.
blueprint: blueprint/src/content.tex
lean: [LeeLib]
