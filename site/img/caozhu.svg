<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" width="400" height="600" role="img"
     aria-label="Cao and Zhu, Hamilton–Perelman's Proof of the Poincaré and Geometrization Conjectures">
  <defs>
    <linearGradient id="cz-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1f3a52"/>
      <stop offset="100%" stop-color="#122534"/>
    </linearGradient>
  </defs>
  <rect width="400" height="600" fill="url(#cz-bg)"/>
  <rect x="0" y="0" width="14" height="600" fill="#0d1a25"/>
  <rect x="42" y="54" width="316" height="2" fill="#7fb2d4"/>
  <rect x="42" y="546" width="316" height="2" fill="#7fb2d4"/>

  <text x="42" y="96" fill="#7fb2d4" font-family="DejaVu Sans, sans-serif"
        font-size="15" letter-spacing="3">ASIAN J. MATH. 10 (2006)</text>

  <text fill="#f4f8fb" font-family="DejaVu Serif, Georgia, serif" font-size="34" font-weight="bold">
    <tspan x="42" y="212">Hamilton–</tspan>
    <tspan x="42" y="254">Perelman’s</tspan>
    <tspan x="42" y="296">Proof</tspan>
  </text>

  <text fill="#c9dced" font-family="DejaVu Serif, Georgia, serif" font-size="20">
    <tspan x="42" y="346">of the Poincaré and</tspan>
    <tspan x="42" y="374">Geometrization</tspan>
    <tspan x="42" y="402">Conjectures</tspan>
  </text>

  <text fill="#f4f8fb" font-family="DejaVu Sans, sans-serif" font-size="18">
    <tspan x="42" y="490">Huai-Dong Cao</tspan>
    <tspan x="42" y="516">Xi-Ping Zhu</tspan>
  </text>
</svg>
