name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Lake build (${{ matrix.project }})
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        project: [DoCarmo, MorganTian, Petersen]
    steps:
      - uses: actions/checkout@v4

      - name: Install elan (Lean toolchain manager)
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Print Lean version
        working-directory: ${{ matrix.project }}
        run: lean --version

      # Cache the full Lake build (oleans + packages) for this project. Keyed
      # on its own manifest + toolchain so a Mathlib/toolchain bump
      # invalidates just that project's cache.
      - name: Cache .lake build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ${{ matrix.project }}/.lake/build
            ${{ matrix.project }}/.lake/packages
          key: lake-${{ runner.os }}-${{ matrix.project }}-${{ hashFiles(format('{0}/lake-manifest.json', matrix.project), format('{0}/lean-toolchain', matrix.project)) }}
          restore-keys: |
            lake-${{ runner.os }}-${{ matrix.project }}-

      - name: Fetch Mathlib cache
        working-directory: ${{ matrix.project }}
        run: lake exe cache get

      - name: Lake build
        working-directory: ${{ matrix.project }}
        run: lake build

  sorry-axiom-count:
    name: Sorry / axiom count
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Tracked baseline, not "zero forever": fails only if a project's
      # sorry count goes UP. Lower the corresponding EXPECTED value when a
      # sorry is closed; raise it (deliberately, in the same PR) when a new
      # one is added.
      - name: Count sorries against tracked baseline
        run: |
          declare -A EXPECTED=( [DoCarmo]=3 [MorganTian]=3 [Petersen]=19 )
          fail=0
          for p in "${!EXPECTED[@]}"; do
            actual=$(grep -rnE "^[[:space:]]*sorry[[:space:]]*$|by sorry|:= sorry" \
              --include="*.lean" "$p" 2>/dev/null | wc -l | tr -d ' ')
            expected=${EXPECTED[$p]}
            if [ "$actual" -gt "$expected" ]; then
              echo "::error::$p: sorry count increased ($actual > $expected). If intentional, raise EXPECTED[$p] in this workflow."
              fail=1
            else
              echo "$p: sorry count $actual (baseline $expected)"
            fi
          done
          exit $fail

      - name: Count axioms (expect zero)
        run: |
          fail=0
          for p in DoCarmo MorganTian Petersen; do
            actual=$(grep -rnE "^axiom[[:space:]]+[a-zA-Z_][a-zA-Z0-9_']*[[:space:]]*$" \
              --include="*.lean" "$p" 2>/dev/null | wc -l | tr -d ' ')
            if [ "$actual" -ne 0 ]; then
              echo "::error::$p: found $actual axiom declaration(s), expected 0. Document and update this workflow if intentional."
              fail=1
            else
              echo "$p: axiom count 0"
            fi
          done
          exit $fail
