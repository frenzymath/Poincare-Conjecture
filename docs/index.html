    <script>window.__HGRAPH_DATA__={"title": "Formalizing the Poincaré Conjecture", "subtitle": "A Lean 4 formalization of the proof of the Poincaré conjecture, built on a shared, machine-checked foundation of the geometry and analysis it relies on.\n", "brand": null, "overviewHtml": "<section class=\"pc-statement\"><aside class=\"pc-beta\" role=\"note\"><strong>Beta version.</strong> This repository is public for development and transparency, but its contents are preliminary and do not yet constitute an official release.</aside><div class=\"pc-heading\"><div class=\"pc-kicker\">Geometric topology</div><h2 id=\"pc-title\">The Poincaré Conjecture</h2><p>In dimension three, simple connectivity completely determines the topology of a closed manifold.</p></div><div class=\"pc-theorem\" aria-labelledby=\"pc-title\"><div class=\"pc-theorem-label\">Conjecture</div><p>Let $M$ be a <span class=\"pc-term\" tabindex=\"0\" aria-describedby=\"pc-tip-closed\">closed<span class=\"pc-tip\" id=\"pc-tip-closed\" role=\"tooltip\">Compact and without boundary: $M$ is compact and $\\partial M=\\varnothing$.</span></span>, <span class=\"pc-term\" tabindex=\"0\" aria-describedby=\"pc-tip-connected\">connected<span class=\"pc-tip\" id=\"pc-tip-connected\" role=\"tooltip\">$M$ has one connected component; for a manifold, this is equivalent to path-connectedness.</span></span> <span class=\"pc-term\" tabindex=\"0\" aria-describedby=\"pc-tip-manifold\">topological $3$-manifold<span class=\"pc-tip\" id=\"pc-tip-manifold\" role=\"tooltip\">A Hausdorff, second-countable space locally homeomorphic to $\\mathbb{R}^3$.</span></span>. If <span class=\"pc-term\" tabindex=\"0\" aria-describedby=\"pc-tip-fundamental-group\">$\\pi_1(M)=0$<span class=\"pc-tip\" id=\"pc-tip-fundamental-group\" role=\"tooltip\">For a basepoint $x\\in M$, $\\pi_1(M,x)$ is the group of based loops modulo homotopy. Triviality means every loop is null-homotopic.</span></span>, then <span class=\"pc-term\" tabindex=\"0\" aria-describedby=\"pc-tip-conclusion\">$M\\cong S^3$<span class=\"pc-tip\" id=\"pc-tip-conclusion\" role=\"tooltip\">Here $\\cong$ denotes homeomorphism and $S^3=\\{x\\in\\mathbb{R}^4:\\lVert x\\rVert=1\\}$.</span></span>.</p></div><p class=\"pc-bridge\">Perelman proves this classification by evolving a Riemannian metric under Ricci flow, resolving singularities by surgery, and recovering the topology from finite-time extinction.</p><p class=\"pc-history\">Henri Poincaré posed the problem in 1904 while laying the foundations of three-dimensional topology. In 1982, Richard Hamilton introduced Ricci flow and proposed using it to deform a manifold toward a geometrically understandable form. Grigori Perelman's 2002–2003 preprints supplied the decisive ideas, entropy, noncollapsing, and control of singularities, needed to complete Hamilton's program. The detailed account by Morgan and Tian is the principal proof track followed here.</p></section>\n<div class=\"proof-heading\"><div class=\"pc-kicker\">Formalization roadmap</div><h3>The proof architecture</h3><p>The formal development follows the analytic and topological dependencies in Perelman's argument.</p></div>\n<div class=\"pm\">\n<div class=\"pm-phase\" style=\"--pc:#23479b\"><div class=\"pm-h\"><span class=\"pm-n\">1</span>Control the flow and its singularities</div><div class=\"pm-items\"><a class=\"pm-i\" href=\"MorganTian/dashboard.html#ch-4\">Ricci flow<span class=\"pm-d\">The metric evolves by $\\partial_t g_{ij} = -2R_{ij}$; the maximum principle bounds curvature and Hamilton compactness takes limits of rescalings.</span></a><a class=\"pm-i\" href=\"MorganTian/dashboard.html#ch-8\">κ-noncollapsing<span class=\"pm-d\">Perelman's reduced volume is monotone along the flow, forcing $\\operatorname{Vol} B(x,r) \\ge \\kappa\\, r^3$ where $|\\mathrm{Rm}| \\le r^{-2}$ — the flow never collapses.</span></a><a class=\"pm-i\" href=\"MorganTian/dashboard.html#ch-10\">κ-solutions<span class=\"pm-d\">Blowing up at a singularity gives an ancient, $\\kappa$-noncollapsed, nonnegatively-curved model.</span></a></div></div>\n<div class=\"pm-arrow\"><svg class=\"chev\" viewBox=\"0 0 24 24\" width=\"20\" height=\"20\" aria-hidden=\"true\"><path d=\"M6 9l6 6 6-6\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/></svg></div>\n<div class=\"pm-phase\" style=\"--pc:#19734c\"><div class=\"pm-h\"><span class=\"pm-n\">2</span>Model the singularities, then cut them out</div><div class=\"pm-items\"><a class=\"pm-i\" href=\"MorganTian/dashboard.html#ch-20\">Canonical neighborhoods<span class=\"pm-d\">Every high-curvature point lies in a neck $\\approx S^2 \\times \\mathbb{R}$ or a cap — a short, fixed list of local models.</span></a><a class=\"pm-i\" href=\"MorganTian/dashboard.html#ch-16\">Ricci flow with surgery<span class=\"pm-d\">Cut along $\\delta$-necks, glue in capped standard solutions, and restart; the parameters keep the flow $\\kappa$-noncollapsed and canonical.</span></a><a class=\"pm-i\" href=\"MorganTian/dashboard.html#ch-15\">Long-time existence<span class=\"pm-d\">Surgery times do not accumulate, so the flow with surgery runs for all $t \\ge 0$.</span></a></div></div>\n<div class=\"pm-arrow\"><svg class=\"chev\" viewBox=\"0 0 24 24\" width=\"20\" height=\"20\" aria-hidden=\"true\"><path d=\"M6 9l6 6 6-6\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/></svg></div>\n<div class=\"pm-phase\" style=\"--pc:#c2410c\"><div class=\"pm-h\"><span class=\"pm-n\">3</span>Recover the topology under $\\pi_1(M)=0$</div><div class=\"pm-items\"><a class=\"pm-i\" href=\"MorganTian/dashboard.html#ch-19\">Finite-time extinction<span class=\"pm-d\">A min-max width associated to nontrivial $\\pi_2$ or $\\pi_3$ decreases under the flow and forces extinction in finite time.</span></a><a class=\"pm-i\" href=\"MorganTian/dashboard.html#ch-18\">Surgery topology<span class=\"pm-d\">Tracking neck surgeries and discarded components yields a connected-sum decomposition into spherical space forms and $S^2$-bundles over $S^1$.</span></a></div></div>\n<div class=\"pm-arrow\"><svg class=\"chev\" viewBox=\"0 0 24 24\" width=\"20\" height=\"20\" aria-hidden=\"true\"><path d=\"M6 9l6 6 6-6\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/></svg></div>\n<div class=\"pm-goal\"><div class=\"pm-goal-eq\">$M \\cong S^3$</div><div class=\"pm-goal-s\">Van Kampen turns connected sums into free products of fundamental groups. Trivial $\\pi_1(M)$ excludes the nonspherical summands and nontrivial spherical space forms.</div></div>\n</div>\n<style>\n/* theorem statement */\n.overview{margin:44px -24px 0;padding:44px 24px 52px;background:var(--panel);\n border-top:1px solid var(--line);border-bottom:1px solid var(--line)}\n.pc-statement{max-width:760px;margin:0 auto}\n.pc-beta{margin:0 auto 28px;padding:13px 16px;background:var(--soft);color:var(--fg);\n border:1px solid var(--line);border-left:4px solid #bf8700;border-radius:0 6px 6px 0;\n font-size:13.5px;line-height:1.6}\n.pc-heading{text-align:center;max-width:650px;margin:0 auto}\n.pc-kicker{text-transform:uppercase;letter-spacing:.09em;color:var(--accent);\n font-weight:800;font-size:11px;margin-bottom:8px}\n.pc-heading h2,.proof-heading h3{letter-spacing:0;color:var(--fg)}\n.pc-heading h2{font-size:clamp(27px,3vw,34px);line-height:1.18;margin:0 0 10px;font-weight:800}\n.pc-heading p,.proof-heading p{margin:0;color:var(--muted);font-size:15px;line-height:1.6}\n.pc-theorem{margin:28px 0 20px;padding:23px 26px 24px;background:var(--bg);\n border-left:4px solid var(--accent);border-radius:0 6px 6px 0}\n.pc-theorem-label{text-transform:uppercase;letter-spacing:.08em;color:var(--muted);\n font-size:10.5px;font-weight:800;margin-bottom:8px}\n.pc-theorem p{margin:0;font:500 clamp(18px,2.2vw,22px)/1.65 Georgia,\"Times New Roman\",serif;text-align:left}\n.pc-theorem .katex{
